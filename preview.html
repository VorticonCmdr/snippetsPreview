<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, user-scalable=0"
        />
        <meta name="referrer" content="none" />

        <title>Preview</title>

        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        />
        <link rel="stylesheet" href="css/preview.css" />
    </head>

    <body>
        <div class="device-toolbar">
            <label for="device-select" class="device-toolbar-label"
                >Device</label
            >
            <select id="device-select" class="device-toolbar-select"></select>
            <span
                class="device-toolbar-dimensions"
                id="device-dimensions"
            ></span>
        </div>

        <div class="preview-stage">
            <div class="phone-viewport" id="phone-viewport">
                <div class="preview-section">
                    <p class="preview-section-title">Discover preview</p>
                    <div id="card"></div>
                </div>

                <div class="preview-section">
                    <p class="preview-section-title">Top stories preview</p>
                    <div class="results-container">
                        <div id="replica-small"></div>
                        <div id="replica-large"></div>
                        <div id="replica-news"></div>
                    </div>
                </div>

                <div class="preview-section">
                    <p class="preview-section-title">Search preview</p>
                    <div id="serp"></div>
                </div>
            </div>

            <aside class="data-panel">
                <h2 class="data-panel-title">Daten</h2>

                <label class="data-panel-field">
                    <span>og:title (Discover &amp; Top stories)</span>
                    <input type="search" data-bind="title" />
                </label>

                <label class="data-panel-field">
                    <span>title (Search)</span>
                    <input type="search" data-bind="titleTag" />
                </label>

                <label class="data-panel-field">
                    <span>Publisher</span>
                    <input type="search" data-bind="publisher" />
                </label>

                <label class="data-panel-field">
                    <span>meta description</span>
                    <textarea rows="3" data-bind="description"></textarea>
                </label>

                <label class="data-panel-field">
                    <span>Image URL</span>
                    <input type="search" data-bind="imageUrl" />
                    <p class="data-panel-error" hidden>
                        <span class="material-symbols-outlined">warning</span>
                        <span class="data-panel-error-text"></span>
                    </p>
                </label>

                <label class="data-panel-field">
                    <span>Canonical URL</span>
                    <input type="search" data-bind="canonical" />
                </label>

                <label class="data-panel-field">
                    <span>Date published</span>
                    <input type="datetime-local" data-bind="datePublished" />
                </label>

                <label class="data-panel-check">
                    <input type="checkbox" data-bind="live" />
                    <span>Live badge</span>
                </label>
            </aside>
        </div>

        <script src="js/handlebars.runtime.min-v4.7.7.js"></script>
        <script src="js/preview.precompiled.js"></script>
        <script src="js/serp.precompiled.js"></script>
        <script src="js/replica-small.precompiled.js"></script>
        <script src="js/replica-large.precompiled.js"></script>
        <script src="js/replica-news.precompiled.js"></script>
        <script src="js/preview.js"></script>
    </body>
</html>
